<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Autenticación + Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="estilos.css">
    <style>
        .nexus-app { max-width: 1300px; margin: 100px auto; padding: 20px; font-family: 'Exo 2', sans-serif;}
        .gate-container { max-width: 520px; margin: 2rem auto; background: var(--bg-card); border-radius: 2rem; border: 1px solid var(--primary); box-shadow: var(--neon-glow); overflow: hidden; color: var(--text-main); }
        .nexus-header { background: var(--bg-main); padding: 1.8rem 2rem; text-align: center; border-bottom: 1px solid var(--border-light); }
        .nexus-header h1 { font-family: 'Orbitron', monospace; color: var(--primary); text-shadow: var(--neon-glow); }
        .auth-wrapper { padding: 1.8rem 2rem 2rem 2rem; }
        .tabs { display: flex; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-light); padding-bottom: 0.5rem; }
        .tab-btn { background: transparent; border: none; font-size: 1.1rem; font-weight: 600; padding: 0.6rem 1.2rem; border-radius: 2rem; color: var(--text-main); cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--secondary); color: var(--bg-main); box-shadow: var(--neon-glow); }
        .input-group { display: flex; align-items: center; background: var(--bg-main); border-radius: 1.5rem; border: 1px solid var(--secondary); padding: 0.2rem 1rem; margin-bottom: 15px;}
        .input-group i { color: var(--primary); width: 28px; }
        .input-group input { background: transparent; border: none; padding: 0.9rem 0.8rem; width: 100%; color: var(--text-title); outline: none; }
        .auth-btn { background: var(--primary); border: none; padding: 0.9rem; border-radius: 2rem; font-weight: 700; color: var(--bg-main); cursor: pointer; width: 100%; font-family: 'Orbitron', monospace; margin-top: 10px; transition: 0.3s;}
        .auth-btn:hover { background: #fff; box-shadow: var(--neon-glow); }
        .profile-header, .info-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 14px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .nexus-marketplace { width: 100%; }
        .btn-secondary { background: transparent; border: 1px solid var(--secondary); color: var(--primary); padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; transition: 0.3s;}
        .btn-secondary:hover { background: var(--secondary); color: var(--bg-main); }
        .error-msg { color: #ff4757; text-align: center; font-size: 0.9rem; margin-top: 10px; min-height: 20px;}
        .success-msg { color: #2ed573; text-align: center; font-size: 0.9rem; margin-top: 10px; min-height: 20px;}
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="nexus.html" style="text-decoration: none;"><span class="logo-text"><i class="fas fa-link"></i> NEXUS GEAR</span></a>
        </div>
        <nav style="display: flex; gap: 20px; font-weight: bold; margin-left: 20px;">
            <a href="index.html" style="color: var(--text-main); text-decoration: none;">Inicio</a>
            <a href="nexus.html" style="color: var(--text-main); text-decoration: none;">Productos</a>
        </nav>
    </header>

    <div class="nexus-app">
        <div id="dynamicRoot"></div>
    </div>

    <script>
        (function () {
            const SESSION_KEY = "nexus_current_user";
            const TOKEN_KEY = "nexusToken";
            const USERS_DB_KEY = "nexus_users_db"; // Base de datos simulada de usuarios
            let currentTab = 'login'; // Estado de la pestaña

            // Inicializar un usuario administrador por defecto
            if(!localStorage.getItem(USERS_DB_KEY)) {
                localStorage.setItem(USERS_DB_KEY, JSON.stringify([
                    { email: 'admin@nexus.com', password: '123', nombre_completo: 'Admin Nexus', nivel: 'elite' }
                ]));
            }

            function getCurrentUser() {
                const raw = localStorage.getItem(SESSION_KEY);
                return raw ? JSON.parse(raw) : null;
            }

            // Exponer función para renderizar (para que los botones funcionen)
            window.switchTab = function(tab) {
                currentTab = tab;
                renderGate();
            }

            function renderGate() {
                const isLogin = currentTab === 'login';
                
                const html = `
                <div class="gate-container">
                    <div class="nexus-header"><h1><i class="fas fa-link"></i> NEXUS</h1><p>Autenticación de Sistema</p></div>
                    <div class="auth-wrapper">
                        <div class="tabs">
                            <button class="tab-btn ${isLogin ? 'active' : ''}" onclick="switchTab('login')">Iniciar Sesión</button>
                            <button class="tab-btn ${!isLogin ? 'active' : ''}" onclick="switchTab('register')">Registrarse</button>
                        </div>
                        
                        ${isLogin ? `
                        <form id="loginFormGate" class="auth-form">
                            <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="correo@nexus.com" required></div>
                            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Contraseña" required></div>
                            <button type="submit" class="auth-btn">Ingresar a Nexus</button>
                            <div id="authMessage" class="error-msg"></div>
                        </form>
                        ` : `
                        <form id="registerFormGate" class="auth-form">
                            <div class="input-group"><i class="fas fa-user"></i><input type="text" id="regName" placeholder="Nombre completo" required></div>
                            <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="correo@nexus.com" required></div>
                            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="regPassword" placeholder="Contraseña" required></div>
                            <button type="submit" class="auth-btn">Crear Cuenta</button>
                            <div id="authMessage" class="error-msg"></div>
                        </form>
                        `}
                    </div>
                </div>`;
                
                document.getElementById("dynamicRoot").innerHTML = html;

                if(isLogin) {
                    document.getElementById("loginFormGate").addEventListener("submit", (e) => {
                        e.preventDefault();
                        const email = document.getElementById("loginEmail").value.trim();
                        const pass = document.getElementById("loginPassword").value;
                        const msgBox = document.getElementById("authMessage");

                        let users = JSON.parse(localStorage.getItem(USERS_DB_KEY));
                        let foundUser = users.find(u => u.email === email && u.password === pass);

                        if(foundUser) {
                            msgBox.className = "success-msg";
                            msgBox.innerText = "¡Autenticación exitosa!";
                            localStorage.setItem(SESSION_KEY, JSON.stringify(foundUser));
                            localStorage.setItem(TOKEN_KEY, "simulated-token-xyz");
                            setTimeout(renderFullApp, 800);
                        } else {
                            msgBox.className = "error-msg";
                            msgBox.innerText = "Correo o contraseña incorrectos.";
                        }
                    });
                } else {
                    document.getElementById("registerFormGate").addEventListener("submit", (e) => {
                        e.preventDefault();
                        const name = document.getElementById("regName").value.trim();
                        const email = document.getElementById("regEmail").value.trim();
                        const pass = document.getElementById("regPassword").value;
                        const msgBox = document.getElementById("authMessage");

                        let users = JSON.parse(localStorage.getItem(USERS_DB_KEY));
                        if(users.find(u => u.email === email)) {
                            msgBox.className = "error-msg";
                            msgBox.innerText = "Este correo ya está registrado.";
                            return;
                        }

                        // Crear nuevo usuario
                        users.push({ email: email, password: pass, nombre_completo: name, nivel: 'starter' });
                        localStorage.setItem(USERS_DB_KEY, JSON.stringify(users));
                        
                        msgBox.className = "success-msg";
                        msgBox.innerText = "¡Cuenta creada! Inicia sesión ahora.";
                        setTimeout(() => switchTab('login'), 1500);
                    });
                }
            }

            function renderMarketplaceProfile(user) {
                const html = `
                <div class="nexus-marketplace">
                    <div class="profile-header" style="display:flex; justify-content:space-between; align-items:center;">
                        <h2 style="color: var(--primary); font-family: 'Orbitron', monospace;">PANEL DE CONTROL</h2>
                        <button class="btn-secondary" id="logoutBtn">Cerrar Sesión</button>
                    </div>
                    <div style="display:flex; gap: 20px; flex-wrap: wrap;">
                        <div class="info-card" style="flex:1; min-width: 250px;">
                            <h3 style="color: var(--text-title);"><i class="fas fa-user-circle"></i> ${user.nombre_completo}</h3>
                            <p>Email: ${user.email}</p>
                            <p style="margin-top:10px; color: var(--primary);">Nivel: ${user.nivel.toUpperCase()}</p>
                        </div>
                        <div class="info-card" style="flex:2; min-width: 300px;">
                            <h3 style="color: var(--text-title); margin-bottom: 15px;"><i class="fas fa-history"></i> Historial de Nexus</h3>
                            <p>No hay pedidos recientes en este dispositivo.</p>
                            <button class="auth-btn" style="width: auto; padding: 10px 20px; margin-top: 15px;" onclick="window.location.href='nexus.html'">Ir de compras</button>
                        </div>
                    </div>
                </div>`;
                document.getElementById("dynamicRoot").innerHTML = html;
                document.getElementById("logoutBtn").addEventListener("click", () => {
                    localStorage.removeItem(SESSION_KEY);
                    localStorage.removeItem(TOKEN_KEY);
                    renderFullApp();
                });
            }

            function renderFullApp() {
                const currentUser = getCurrentUser();
                if (currentUser) renderMarketplaceProfile(currentUser);
                else renderGate();
            }

            renderFullApp();
        })();
    </script>
</body>
</html>
